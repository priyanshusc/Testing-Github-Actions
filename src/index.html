<!DOCTYPE html>
<html lang="en">
<head>
    <title>MERN Registration Playground</title>
</head>
<body>
    <h2>Create Account</h2>
    <form id="regForm">
        <input type="email" id="email" placeholder="Enter email" required><br><br>
        <input type="password" id="password" placeholder="Enter password" required><br><br>
        <button type="submit" id="submitBtn">Register</button>
    </form>
    <div id="message" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                // Shoot a real fetch request directly into our local Express backend
                const response = await fetch('http://localhost:5000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.status === 201) {
                    messageDiv.style.color = 'green';
                    messageDiv.innerText = data.message;
                } else {
                    messageDiv.style.color = 'red';
                    messageDiv.innerText = data.error;
                }
            } catch (err) {
                messageDiv.innerText = "Cannot connect to backend server";
            }
        });
    </script>
</body>
</html>
